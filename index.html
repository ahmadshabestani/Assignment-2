<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Document</title>
</head>
<body>
<table border="1px" style="width: 70%;">
    <tr style="height: 50px">
        <td style="width:70%" align="center"><input type="text" placeholder="name" style=" text-align: right"></td>
        <td style="width:30%" align="right">نام</td>
    </tr>
    <tr style="height: 50px">
        <td align="center"><input type="email" placeholder="email" style=" text-align: right"></td>
        <td align="right" rowspan="2">ایمیل</td>
    </tr>
    <tr style="height: 50px">
        <td align="center"><input type="password" value="123" style=" text-align: right"></td>
    </tr>
    <tr style="height: 50px">
        <td style="width:70%" align="center"><input type="date" placeholder="name"></td>
        <td style="width:30%" align="right">تاریخ تولد</td>
    </tr>
    <tr style="height: 50px">
        <td style="width:70%" align="center"><input style=" text-align: right" type="text" value="27"></td>
        <td style="width:30%" align="right">سن</td>
    </tr>
    <tr style="height: 50px">
        <td style="width:70%" align="center"><input type="color" value="#04ff00"></td>
        <td style="width:30%" align="right">رنگ مورد علاقه</td>
    </tr>
    <tr style="height: 50px">
        <td align="center">
            😷 ماسک مزنم<input type="radio" name="mask">
            <br>
            😐ماسک نمزنم<input type="radio" name="mask">
        </td>
        <td style="width: 30%" align="right">ماسک مزنی یا نه یره ؟</td>
    </tr>
    <tr style="height: 50px">
        <td style="width:70%" align="center">
            🍊<input type="checkbox" checked>
            🍌<input type="checkbox" checked>
            🥭<input type="checkbox">
            🍑<input type="checkbox">
            🥑<input type="checkbox">
        </td>
        <td style="width:30%" align="right">میوه مورد علاقه</td>
    </tr>
    <tr style="height: 50px">
        <td style="width: 70%" align="center">
            <select>
                <option>ایران</option>
                <option>آمریکا</option>
            </select>
        </td>
        <td style="width:30%" align="right">کشور</td>
    </tr>
    <tr style="height: 150px">
        <td style="width:70%" align="center"><textarea style="width: 80%; height: 100px; text-align: right"
                                                       placeholder=" ... هرچه میخواهد دل تنگت بگو"></textarea></td>
        <td style="width:30%" align="right">زندگی نامه</td>
    </tr>
    <tr>
        <td align="center" style="height: 50px" colspan="2"><input type="submit" value="نام نویسی"></td>
    </tr>

</table>
</body>


</html>
